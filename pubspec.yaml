name: research_cse
description: Faculty Research Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.3.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🔥 Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.2

  # 🔥 File & Image
  file_picker: ^8.0.3
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # 🔥 State Management
  provider: ^6.1.2

  # 🔥 Utilities
  intl: ^0.20.2
  email_validator: ^3.0.0
  flutter_svg: ^2.0.16
  shared_preferences: ^2.3.4
  uuid: ^4.2.2
  flutter_spinkit: ^5.2.1

  # 🔥 PDF
  pdf: ^3.11.3
  printing: ^5.14.2

  # 🔥 Google Login + Drive
  google_sign_in: ^6.2.1
  googleapis: ^13.1.0
  googleapis_auth: ^1.4.1
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/college_logo.png
